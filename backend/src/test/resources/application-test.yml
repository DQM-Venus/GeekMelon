spring:
  datasource:
    url: jdbc:h2:mem:geekmelon;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
    show-sql: false

geekmelon:
  admin:
    username: admin
    password: geekmelon-admin
  editorial:
    enabled: false
    api-key:

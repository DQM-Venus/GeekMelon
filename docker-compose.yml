services:
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    image: geekmelon-frontend:latest
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    image: geekmelon-backend:latest
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      GM_DB_URL: ${GM_DB_URL}
      GM_DB_USERNAME: ${GM_DB_USERNAME}
      GM_DB_PASSWORD: ${GM_DB_PASSWORD}
      GM_INGEST_TOKEN: ${GM_INGEST_TOKEN}
      GM_ADMIN_USERNAME: ${GM_ADMIN_USERNAME}
      GM_ADMIN_PASSWORD: ${GM_ADMIN_PASSWORD}
      GM_EDITORIAL_ENABLED: ${GM_EDITORIAL_ENABLED}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      GM_EDITORIAL_MODEL: ${GM_EDITORIAL_MODEL}
      GM_EDITORIAL_BASE_URL: ${GM_EDITORIAL_BASE_URL}
      GM_EDITORIAL_REQUEST_TIMEOUT_SECONDS: ${GM_EDITORIAL_REQUEST_TIMEOUT_SECONDS}
      GM_EDITORIAL_PICK_COUNT: ${GM_EDITORIAL_PICK_COUNT}
      GM_EDITORIAL_CANDIDATE_COUNT: ${GM_EDITORIAL_CANDIDATE_COUNT}
      GM_EDITORIAL_CACHE_TTL_SECONDS: ${GM_EDITORIAL_CACHE_TTL_SECONDS}
      GM_CRAWLER_RUNNER_MODE: embedded
      GM_CRAWLER_PYTHON_COMMAND: python3
      GM_CRAWLER_WORKING_DIRECTORY: /app/crawler
      GM_CRAWLER_API_BASE_URL: http://127.0.0.1:8080
    expose:
      - "8080"

  crawler:
    build:
      context: .
      dockerfile: crawler/Dockerfile
    image: geekmelon-crawler:latest
    profiles:
      - tools
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      GM_API_BASE_URL: http://backend:8080
      GM_DB_URL: ${GM_DB_URL}
      GM_DB_USERNAME: ${GM_DB_USERNAME}
      GM_DB_PASSWORD: ${GM_DB_PASSWORD}
      GM_INGEST_TOKEN: ${GM_INGEST_TOKEN}
      GM_ENABLE_DEEPSEEK: ${GM_EDITORIAL_ENABLED}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      GM_DEEPSEEK_MODEL: ${GM_EDITORIAL_MODEL}
      GM_DEEPSEEK_BASE_URL: ${GM_EDITORIAL_BASE_URL}
      GM_DEEPSEEK_REQUEST_TIMEOUT_SECONDS: ${GM_EDITORIAL_REQUEST_TIMEOUT_SECONDS}
    working_dir: /app/crawler
